version: '3.8'

# Docker Compose para desarrollo: levanta MySQL y los microservicios (doctor, agenda)
services:
  mysql:
    image: mysql:8.0
    container_name: sistema-telemedicina-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  doctor:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    image: doctor-service:latest
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/doctors_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: doctors
      SPRING_DATASOURCE_PASSWORD: doctors123
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  agenda:
    build:
      context: ./agenda-service
      dockerfile: Dockerfile
    image: agenda-service:latest
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agenda_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: agenda
      SPRING_DATASOURCE_PASSWORD: agenda123
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  appointment:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    image: appointment-service:latest
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/appointment_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: appointment
      SPRING_DATASOURCE_PASSWORD: appointment123
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  patient:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    image: patient-service:latest
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/patients_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: patients
      SPRING_DATASOURCE_PASSWORD: patients123
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

volumes:
  mysql_data:

networks:
  default:
    driver: bridge

