spring:
  application:
    name: patient-service

  profiles:
    active: h2

  datasource:
    url: jdbc:h2:mem:patientsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8081

logging:
  level:
    root: INFO
    cl.duoc.fullstack.patientservice: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%-5level] %logger{0} - %msg%n"
  file:
    name: logs/patient-service.log
