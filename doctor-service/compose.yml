services:
  mysql:
    image: mysql:8.0
    container_name: doctors-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: doctors_db
      MYSQL_USER: doctors
      MYSQL_PASSWORD: doctors123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: