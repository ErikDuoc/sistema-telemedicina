server:
  port: 8082
  servlet:
    context-path: /doctorservice

spring:

  application:
    name: doctor-service

  datasource:
    url: jdbc:h2:mem:doctordb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

## Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    #path: /doc/swagger-ui.html

# JWT Configuration - Use environment variables in production
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-min-32-characters-long-for-security}
  expiration: ${JWT_EXPIRATION:86400000}

