spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patients/**
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/doctors/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
        - id: agenda-service
          uri: lb://agenda-service
          predicates:
            - Path=/api/agenda/**
        - id: laboratory-service
          uri: lb://laboratory-service
          predicates:
            - Path=/api/lab/**
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments/**
        - id: clinical-record-service
          uri: lb://clinical-record-service
          predicates:
            - Path=/api/clinical-records/**
        - id: prescription-service
          uri: lb://prescription-service
          predicates:
            - Path=/api/prescriptions/**
        - id: video-consultation-service
          uri: lb://video-consultation-service
          predicates:
            - Path=/api/video-consultations/**

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
