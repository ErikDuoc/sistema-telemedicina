spring:
  application:
    name: appointment-service

  # JWT Configuration - Use environment variables in production
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production-min-32-characters-long-for-security}
    expiration: ${JWT_EXPIRATION:86400000}

  datasource:
    url: jdbc:h2:mem:appointmentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8087

# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui/index.html