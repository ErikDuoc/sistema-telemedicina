spring:
  application:
    name: appointment-service

  # JWT Configuration - Use environment variables in production
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production-min-32-characters-long-for-security}
    expiration: ${JWT_EXPIRATION:86400000}

  datasource:
    url: jdbc:h2:mem:appointmentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8087

## Swagger / OpenAPI
# Feign client base URLs (defaults for local development)
doctor-service:
  url: http://localhost:8082

agenda-service:
  url: http://localhost:8085

patient-service:
  url: http://localhost:8081

# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
