server:
  port: 8084

spring:
  application:
    name: payment-service

  # JWT Configuration - Use environment variables in production
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production-min-32-characters-long-for-security}
    expiration: ${JWT_EXPIRATION:86400000}

  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

## Swagger / OpenAPI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

